<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Home</title>
    <!-- Google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy UI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awosome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS file  -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body class="bg-gray-100">
    <header class="shadow-md bg-white">
      <nav class="w-11/12 mx-auto p-4 flex justify-between flex-wrap gap-3">
        <!-- Nav Logo -->
        <div class="flex items-center gap-2">
          <span class="text-4xl"
            ><i class="fa-brands fa-github text-center"></i
          ></span>
          <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <!-- seacrh -->
        <div class="join">
          <div>
            <input
              class="input focus:border-none focus:outline-none"
              type="text"
              placeholder="Search issues..."
            />
          </div>
          <button class="btn btn-primary join-item">Search</button>
        </div>
      </nav>
    </header>
    <main class="">
      <section class="tab-btn-container w-11/12 mx-auto shadow-md mt-10">
        <!-- name of each tab group should be unique -->
        <div
          class="tabs tabs-box flex md:justify-start justify-center p-4 gap-4"
        >
          <input
            onclick="loadAllIssues()"
            type="radio"
            name="all-tab"
            class="tab px-10 active"
            aria-label="All"
          />
          <input
            onclick="loadOpenIssue()"
            type="radio"
            name="open-tab"
            class="tab px-10 border border-gray-300"
            aria-label="Open"
          />
          <input
            onclick="loadClosedIssue()"
            type="radio"
            name="close-tab"
            class="tab px-10 border border-gray-300"
            aria-label="Closed"
          />
        </div>
      </section>
      <!-- status section -->
      <section class="w-11/12 mx-auto shadow-md p-6 bg-white mt-5 rounded-md">
        <div
          class="flex justify-center md:justify-between items-center flex-wrap gap-3"
        >
          <div class="flex items-center gap-3">
            <!-- <div class="bg-gray-300 p-2 rounded-full flex justify-center items-center">
            </div> -->
            <div
              class="bg-[#ECE4FF] p-2 rounded-full flex items-center justify-center"
            >
              <i class="fa-solid fa-circle-radiation text-primary text-3xl"></i>
            </div>
            <div>
              <h2 class="text-2xl font-medium">
                <span id="cardCount">0</span> Issues
              </h2>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-3">
            <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
            <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
          </div>
        </div>
      </section>

      <!-- issue card section -->
      <section
        class="w-11/12 mx-auto shadow-md p-6 bg-white border-t-1 border-gray-300 rounded-md"
      >
        <!--Issue card container -->
        <div
          id="card-container"
          class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"
        ></div>
      </section>
    </main>

    <!-- js file -->

    <script src="./script/login.js"></script>
    <script src="./script/index.js"></script>
  </body>
</html>
